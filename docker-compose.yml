services:
  db:
    image: postgres:18-alpine
    container_name: chaincare-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  # backend service
  core-service:
    build:
      context: ./backend
      dockerfile: services/core-service/Dockerfile
    container_name: chaincare-core
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
    volumes:
      - ./backend:/app
    working_dir: /app/services/core-service
    depends_on:
      - db


  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: chaincare-client
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - core-service

volumes:
  postgres_data: